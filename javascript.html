<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- use 'script src' to link an external javascript -->
    <script>
        function changeText(){
            document.getElementById('change').innerHTML = 'Paragraph Changed.';
        }
    </script>
</head>
<body>
    <p id="demo">This content will change</p>
    <button onclick="document.getElementById('demo').innerHTML = 'Hi!!! welcome to javascript'">Click Me</button>

    <br><hr>

    <button onclick="document.getElementById('myImage').src = 'image/pic_bulbon.gif'">Turn on the ligth bulb</button>
    <img id="myImage" src="image/pic_bulboff.gif" alt="">
    <button onclick="document.getElementById('myImage').src = 'image/pic_bulboff.gif'">Turn off the light bulb</button>

    <br><hr>

    <p id="big">This text will become bigger.</p>
    <button onclick="document.getElementById('big').style.fontSize='35px'">click to make bigger</button>
    <!-- be careful for carmelcase for exapmle fontsize  the 'S should be captial letter.' -->

    <br><br><hr>

    <p id="display">This text will be removed</p>
    <button onclick="document.getElementById('display').style.display ='none'">Remove this text</button>

    <br><hr>

    <p> click to button to know my name </p>
    <p id="block" style="display: none;"> Tiwaloluwa Awe </p>
    <button onclick="document.getElementById('block').style.display = 'block'">Click to know my name</button>

    <br><hr>

    <p id="insert"></p>
    <script>
        document.getElementById('insert').innerHTML = 'My first javascript'
    </script>

    <br><hr>

    <p id="change">this paragraph will change</p>
    <button onclick="changeText()">Click to change this paragraph</button>
    <!-- a function was used to change the function and it was done at the header section. -->

    <br><hr>

    <p id="innertext"></p>
    <button onclick="document.getElementById('innertext').innerText ='Hey, innertext was use to do this'">Click me to input text in the onclick effect</button>
    <!-- 'innertext' was used for this not 'innerhtml.'' -->

    <br><hr>
    
    <script>
        document.write(5 + 6);
    </script>
    <!-- this should only be used for testing. -->

    <br>

    <script>
        window.alert('welcome to my testing page');
    </script>
    <!-- this drops a notificaton in the browser.... it can be in number for example (5+6) this is will give back 11 -->
     <script>
        alert('welcome to my javascript testing page.');
     </script>
     <!-- it isn't necessary to use 'window.' you can just use alert-->
    <br><hr>

    <script>
        console.log(5 + 6);
    </script>
    <!-- console.log is used for trouble shooting -->

    <br>

    <p>Clickmthe button to print the page</p>
    <button onclick="window.print()">Click to print</button>
    <!-- window.print() is used to prrint the page -->

    <br><hr>


</body>
</html>
