    <input type="text" id="license" value="18">
    <button onclick="checklicence()">Click to know if you are eligible</button>
    <p id="feedback"></p>

    <script>
        function checklicence(){

            let  eligible;
            let eligibility = document.getElementById('license').value;

            if (isNaN(eligibility)){
                eligible = "input is not a value";
            }else{
                eligible = (eligibility < 18) ? 'Too young' : 'Eligible';
            }
            document.getElementById('feedback').innerHTML = eligible + " to get a driving license.";
        }
        // this is a ternary operator and it is used to check if the user is eligible to get a driving license or not. The 'isNaN' function is used to check if the input is a number or not. If the input is not a number, it will return "input is not a value". If the input is a number, it will check if the age is less than 18 or not. If the age is less than 18, it will return "Too young". If the age is 18 or more, it will return "Eligible".
    </script>
